name: GeminiGen 自动登录过盾
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 */2 * *'
jobs:
  geminigen_login:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: 🛠️ 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool
          pip install seleniumbase requests
          seleniumbase install chromedriver
      - name: 🚀 运行 GeminiGen 登录脚本
        env:
          GEMINIGEN_EMAIL: ${{ secrets.GEMINIGEN_EMAIL }}
          GEMINIGEN_PASSWORD: ${{ secrets.GEMINIGEN_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: xvfb-run python geminigen.py
