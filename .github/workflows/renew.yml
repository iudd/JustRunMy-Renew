name: JustRunMy 多账号自动续期

on:
  workflow_dispatch: # 支持手动触发
  schedule:
    - cron: '0 1 */2 * *' # 每两天运行一次（UTC 时间 1:00）

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write

    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: 🛡️ 启动 Gost 代理转发 (可选)
        env:
          GOST_PROXY_TARGET: ${{ secrets.GOST_PROXY_TARGET }}
        run: |
          if [ -z "$GOST_PROXY_TARGET" ]; then
            echo "ℹ️ 未配置 GOST_PROXY_TARGET，将使用 GitHub Actions 本地网络直连。"
            echo "USE_PROXY=false" >> $GITHUB_ENV
          else
            wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
            gunzip gost-linux-amd64-2.11.5.gz
            chmod +x gost-linux-amd64-2.11.5
            mv gost-linux-amd64-2.11.5 gost
            echo "启动 Gost 转发隧道..."
            nohup ./gost -L http://:8080 -F $GOST_PROXY_TARGET > gost.log 2>&1 &
            sleep 3
            echo "USE_PROXY=true" >> $GITHUB_ENV
          fi
          
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            xdotool \
            scrot \
            fonts-noto-cjk
            
      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase aiohttp requests
          seleniumbase install chromedriver
          
      - name: 🚀 运行续期脚本
        env:
          # 【关键修改】必须确保这里引用了 ACCOUNTS 变量
          ACCOUNTS: ${{ secrets.ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 兼容旧代码变量（可选）
       #   JUSTRUNMY_EMAIL: ${{ secrets.JUSTRUNMY_EMAIL }}
       #   JUSTRUNMY_PASSWORD: ${{ secrets.JUSTRUNMY_PASSWORD }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python justrunmy_renewd.py
            
      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
          
      - name: 🧹 清理旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
            
          
  
